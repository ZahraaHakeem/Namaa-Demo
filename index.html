<!DOCTYPE html>
<html>
<head>
<title>Namaa Demo</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #f5f7fa;
    padding: 40px;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
    <h2>🌱 Namaa System</h2>

    <!-- 👇 السماح باختيار عدة صور -->
    <input type="file" id="images" multiple><br><br>

    <input type="number" id="age" placeholder="Enter age"><br><br>

    <button onclick="send()">Predict</button>

    <p id="result">Result will appear here</p>
</div>

<script>
async function send() {

    const files = document.getElementById("images").files;
    const age = document.getElementById("age").value;

    if (files.length === 0 || !age) {
        alert("Upload images + enter age");
        return;
    }

    if (files.length !== 3) {
        alert("Please upload exactly 3 images");
        return;
    }

    document.getElementById("result").innerText = "⏳ Processing...";

    try {
        // تحويل الصور إلى base64
        const base64Images = await Promise.all(
            Array.from(files).map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);

                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
            })
        );

        const response = await fetch(
            "https://salma112003-nutriscreener-demo.hf.space/api/predict",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    data: [
                        base64Images,   // 👈 هنا 3 صور
                        Number(age)
                    ]
                })
            }
        );

        console.log("Status:", response.status);

        if (!response.ok) {
            throw new Error("Server error: " + response.status);
        }

        const data = await response.json();

        console.log("Response:", data);

        document.getElementById("result").innerText =
            "✅ Result: " + JSON.stringify(data);

    } catch (error) {
        console.error(error);

        document.getElementById("result").innerText =
            "❌ Error: " + error.message;
    }
}
</script>

</body>
</html>
