<!DOCTYPE html>
<html>
<head>
<title>Namaa Demo</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background: #f5f7fa;
    padding: 40px;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
    padding: 10px 20px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#result {
    margin-top: 20px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
    <h2>🌱 Namaa System</h2>

    <!-- اختيار 3 صور -->
    <input type="file" id="images" multiple><br><br>

    <input type="number" id="age" placeholder="Enter age"><br><br>

    <button onclick="send()">Predict</button>

    <p id="result">Result will appear here</p>
</div>

<script>

// 🔥 تصغير + ضغط الصورة
async function resizeAndCompress(file) {
    return new Promise((resolve, reject) => {

        const img = new Image();
        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () => {
            img.src = reader.result;
        };

        img.onload = () => {

            const canvas = document.createElement("canvas");

            const MAX_WIDTH = 224;
            const MAX_HEIGHT = 224;

            let width = img.width;
            let height = img.height;

            if (width > height) {
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
            } else {
                if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            const compressed = canvas.toDataURL("image/jpeg", 0.7);

            resolve(compressed);
        };

        img.onerror = reject;
    });
}


// 🚀 إرسال الطلب
async function send() {

    const files = document.getElementById("images").files;
    const age = document.getElementById("age").value;

    if (files.length === 0 || !age) {
        alert("Upload images + enter age");
        return;
    }

    if (files.length !== 3) {
        alert("Please upload exactly 3 images");
        return;
    }

    document.getElementById("result").innerText = "⏳ Processing...";

    try {
        // ضغط الصور
        const base64Images = await Promise.all(
            Array.from(files).map(file => resizeAndCompress(file))
        );

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 60000);

        const response = await fetch(
            "https://salma112003-nutriscreener-demo.hf.space/api/predict",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    data: [
                        base64Images,
                        Number(age)
                    ]
                }),
                signal: controller.signal
            }
        );

        clearTimeout(timeout);

        console.log("Status:", response.status);

        if (!response.ok) {
            throw new Error("Server error: " + response.status);
        }

        const data = await response.json();

        console.log("Response:", data);

        document.getElementById("result").innerText =
            "✅ Result: " + JSON.stringify(data);

    } catch (error) {
        console.error(error);

        if (error.name === "AbortError") {
            document.getElementById("result").innerText =
                "⏱️ Timeout: السيرفر لم يرد";
        } else {
            document.getElementById("result").innerText =
                "❌ Error: " + error.message;
        }
    }
}

</script>

</body>
</html>
